<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pi Cam</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 1rem;
      gap: 1rem;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      opacity: 0.7;
    }

    #status {
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      background: #222;
    }

    #status.connected {
      background: #14532d;
      color: #4ade80;
    }

    #networkMode {
      font-size: 0.8rem;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: #222;
      color: #aaa;
    }

    #networkMode.turn {
      background: #3b2f0a;
      color: #facc15;
    }

    #networkMode.p2p {
      background: #0f3a2e;
      color: #34d399;
    }

    #status.error {
      background: #450a0a;
      color: #f87171;
    }

    video {
      width: 100%;
      max-width: 640px;
      height: auto;
      background: #111;
      border-radius: 0.75rem;
      object-fit: contain;
      display: block;
    }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .toolbar {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    button {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: background 0.2s;
    }

    button:disabled {
      background: #333;
      color: #666;
      cursor: default;
    }

    #startBtn {
      background: #2563eb;
    }

    #stopBtn {
      background: #dc2626;
    }

    #liveBtn {
      background: #059669;
      display: none;
    }

    #settingsBtn,
    #saveSettingsBtn,
    #fullscreenBtn {
      background: #374151;
    }

    #fullscreenBtn {
      padding: 0.75rem 1rem;
      font-size: 1.2rem;
    }

    .toggle-row {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .toggle input {
      width: 1rem;
      height: 1rem;
      accent-color: #2563eb;
    }

    #timeline-panel,
    #settings-panel,
    #log {
      width: 100%;
      max-width: 640px;
    }

    #timeline-panel,
    #settings-panel {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      background: #151515;
      border-radius: 0.75rem;
      padding: 0.9rem;
    }

    #settings-panel {
      gap: 0.85rem;
    }

    #settings-panel h2 {
      font-size: 0.9rem;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.82rem;
      opacity: 0.75;
    }

    .field input {
      width: 100%;
      border: 1px solid #2d2d2d;
      border-radius: 0.5rem;
      background: #111;
      color: #eee;
      padding: 0.75rem 0.85rem;
      font-size: 0.95rem;
    }

    #settings-note {
      font-size: 0.75rem;
      opacity: 0.55;
      line-height: 1.5;
    }

    #timeline-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      opacity: 0.75;
    }

    #dvrSlider {
      width: 100%;
      accent-color: #2563eb;
    }

    #timeline-status {
      font-size: 0.82rem;
      opacity: 0.75;
    }

    #log {
      font-size: 0.75rem;
      opacity: 0.55;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ============================================================
       STARRED MOMENTS — new styles added by paras0608
       No existing styles were changed above this line.
       ============================================================ */

    #star-panel {
      width: 100%;
      max-width: 640px;
      background: #151515;
      border-radius: 0.75rem;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #star-panel h2 {
      font-size: 0.9rem;
      opacity: 0.6;
      letter-spacing: 0.05em;
    }

    .star-add-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    #starNameInput {
      flex: 1;
      min-width: 150px;
      border: 1px solid #2d2d2d;
      border-radius: 0.5rem;
      background: #111;
      color: #eee;
      padding: 0.6rem 0.85rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #starNameInput:focus {
      border-color: #f59e0b;
    }

    #starNameInput::placeholder {
      color: #555;
    }

    #starBtn {
      background: #92400e;
      padding: 0.6rem 1.2rem;
      font-size: 0.9rem;
      border-radius: 0.5rem;
      white-space: nowrap;
    }

    #starBtn:hover {
      background: #b45309;
    }

    /* star markers that sit on top of the slider */
    #star-track-wrap {
      position: relative;
      width: 100%;
    }

    #star-track {
      position: relative;
      height: 20px;
      margin-bottom: 2px;
    }

    .star-pin {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: transform 0.15s;
      z-index: 5;
    }

    .star-pin:hover {
      transform: translateX(-50%) scale(1.4);
    }

    .star-pin-tip {
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: #1c1a08;
      border: 1px solid #f59e0b;
      color: #fde68a;
      font-size: 0.65rem;
      white-space: nowrap;
      padding: 2px 7px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .star-pin:hover .star-pin-tip {
      opacity: 1;
    }

    /* list of starred moments */
    #star-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .star-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 0.5rem;
      padding: 0.55rem 0.75rem;
      animation: starSlide 0.2s ease;
    }

    @keyframes starSlide {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .star-item-time {
      font-size: 0.8rem;
      color: #fbbf24;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .star-item-name {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px dashed #333;
      color: #ccc;
      font-size: 0.82rem;
      padding: 1px 4px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 60px;
    }

    .star-item-name:focus {
      border-bottom-color: #f59e0b;
      color: #fde68a;
    }

    .star-del {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .star-del:hover {
      color: #f87171;
      background: #1f1414;
    }

    .star-empty {
      font-size: 0.8rem;
      color: #333;
    }

    /* toast */
    #star-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1c1a08;
      border: 1px solid #f59e0b;
      color: #fde68a;
      font-size: 0.8rem;
      padding: 7px 16px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 9999;
      white-space: nowrap;
    }

    #star-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <h1>PI CAM</h1>
  <div id="status">Connecting...</div>
  <div id="networkMode">Mode: --</div>
  <video id="video" autoplay playsinline></video>

  <div class="toolbar">
      <button id="fullscreenBtn" type="button">⛶</button>
    <button id="settingsBtn" type="button">Settings</button>
  </div>

  <div class="btn-row">
    <button id="startBtn" disabled>Start Stream</button>
    <button id="stopBtn" disabled>Stop Stream</button>
    <button id="liveBtn">Go Live</button>
  </div>

  <div class="toggle-row">
    <label class="toggle">
      <input id="relayOnlyToggle" type="checkbox" />
      <span>Force relay/TURN only</span>
    </label>
    <label class="toggle">
      <input id="muteToggle" type="checkbox" />
      <span>Mute audio</span>
    </label>
  </div>

  <div id="settings-panel">
    <h2>SETTINGS</h2>
    <div class="field">
      <label for="nodeIdInput">Anedya Node ID</label>
      <input id="nodeIdInput" type="text" placeholder="Node UUID" autocomplete="off" />
    </div>
    <div class="field">
      <label for="apiKeyInput">Anedya API Key</label>
      <input id="apiKeyInput" type="password" placeholder="Bearer ..." autocomplete="off" />
    </div>
    <button id="saveSettingsBtn" type="button">Save Settings</button>
    <div id="settings-note">Node ID and API key are stored in this browser via localStorage. Prefix key with <code>Bearer</code> if your token needs it.</div>
  </div>

  <div id="timeline-panel">
    <div id="timeline-meta">
      <span id="timelineCurrent">00:00</span>
      <span id="timelineEnd">LIVE</span>
    </div>
    <input id="dvrSlider" type="range" min="0" max="0" step="0.1" value="0" disabled />
    <div id="timeline-status">Recording starts immediately. Playback appears after first finalized segment.</div>
  </div>

  <!-- ============================================================
       STARRED MOMENTS panel — added by paras0608
       Sits below the existing timeline panel.
       ============================================================ -->
  <div id="star-panel">
    <h2>⭐ STARRED MOMENTS</h2>

    <!-- name input + button -->
    <div class="star-add-row">
      <input
        id="starNameInput"
        type="text"
        maxlength="40"
        placeholder="Name this moment (e.g. Car arrived, Motion at gate)…"
      />
      <button id="starBtn" type="button">⭐ Star</button>
    </div>

    <!-- star pins that appear above the slider -->
    <div id="star-track-wrap">
      <div id="star-track"></div>
    </div>

    <!-- list of saved stars -->
    <div id="star-list">
      <div class="star-empty" id="star-empty">No starred moments yet.</div>
    </div>
  </div>
  <!-- end STARRED MOMENTS -->

  <pre id="log"></pre>

  <!-- toast for star feedback -->
  <div id="star-toast"></div>

  <script>
    /*
      Browser-side viewer.

      Responsibilities:
      1. Ask Anedya for TURN credentials.
      2. Create WebRTC offer.
      3. Write offer into Anedya value store.
      4. Poll for device answer.
      5. Use data channel for control messages.
    */

    // UI references.
    const statusEl = document.getElementById('status');
    const networkModeEl = document.getElementById('networkMode');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const liveBtn = document.getElementById('liveBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const relayOnlyToggle = document.getElementById('relayOnlyToggle');
    const muteToggle = document.getElementById('muteToggle');
    const settingsPanel = document.getElementById('settings-panel');
    const nodeIdInput = document.getElementById('nodeIdInput');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const video = document.getElementById('video');
    const logEl = document.getElementById('log');
    const timelinePanel = document.getElementById('timeline-panel');
    const dvrSlider = document.getElementById('dvrSlider');
    const timelineCurrent = document.getElementById('timelineCurrent');
    const timelineEnd = document.getElementById('timelineEnd');
    const timelineStatus = document.getElementById('timeline-status');

    const ANEDYA_API_BASE = 'https://api.ap-in-1.anedya.io/v1';
    const STORAGE_KEYS = {
      nodeId: 'pi-cam.anedyaNodeId',
      apiKey: 'pi-cam.anedyaApiKey',
      relayOnly: 'pi-cam.relayOnly',
    };

    // Per-browser-session state.
    let pc = null;
    let dc = null;
    let pollTimer = null;
    let timelineTimer = null;
    let timelineRenderTimer = null;
    let latestTimeline = null;
    let timelineReadyLogged = false;
    let draggingSlider = false;
    let lastSeekTime = 0;

    function uiLog(msg) {
      logEl.textContent += msg + '\n';
    }

    function getApiKey() {
      return localStorage.getItem(STORAGE_KEYS.apiKey)?.trim() || '';
    }

    function getNodeId() {
      return localStorage.getItem(STORAGE_KEYS.nodeId)?.trim() || '';
    }

    function getVsHeaders() {
      const apiKey = getApiKey();
      if (!apiKey) {
        throw new Error('Missing API key');
      }
      return {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
        'Authorization': "Bearer " + apiKey,
      };
    }

    function getVsNamespace() {
      const nodeId = getNodeId();
      if (!nodeId) {
        throw new Error('Missing node ID');
      }
      return { scope: 'node', id: nodeId };
    }

    function relayOnlyEnabled() {
      return relayOnlyToggle.checked;
    }

    function syncSettingsUI() {
      nodeIdInput.value = localStorage.getItem(STORAGE_KEYS.nodeId) || '';
      apiKeyInput.value = localStorage.getItem(STORAGE_KEYS.apiKey) || '';
      relayOnlyToggle.checked = localStorage.getItem(STORAGE_KEYS.relayOnly) === 'true';
    }

    function formatTime(totalSeconds) {
      const seconds = Math.max(0, Math.floor(totalSeconds));
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      if (h > 0) return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function resetUI() {
      video.srcObject = null;
      latestTimeline = null;
      timelineReadyLogged = false;
      networkModeEl.textContent = 'Mode: --';
      networkModeEl.className = '';
      startBtn.disabled = false;
      stopBtn.disabled = true;
      liveBtn.style.display = 'none';
      timelinePanel.style.display = 'none';
      dvrSlider.disabled = true;
      dvrSlider.value = 0;
      dvrSlider.max = 0;
      timelineCurrent.textContent = '00:00';
      timelineEnd.textContent = 'LIVE';
      timelineStatus.textContent = 'Recording starts immediately. Playback appears after first finalized segment.';
      statusEl.textContent = 'Ready - press Start';
      statusEl.className = 'connected';
    }

    function stopStream() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      if (timelineTimer) { clearInterval(timelineTimer); timelineTimer = null; }
      if (timelineRenderTimer) { clearInterval(timelineRenderTimer); timelineRenderTimer = null; }
      if (pc) { pc.close(); pc = null; }
      dc = null;
      uiLog('Stream stopped');
      resetUI();
    }

    function toggleSettingsPanel() {
      settingsPanel.style.display = settingsPanel.style.display === 'flex' ? 'none' : 'flex';
    }

    function sendCmd(cmd) {
      if (dc && dc.readyState === 'open') {
        dc.send(JSON.stringify(cmd));
      }
    }

    function getDisplayedTimelinePosition() {
      if (!latestTimeline) return 0;
      if (latestTimeline.mode === 'playback' || latestTimeline.mode === 'gap') {
        const elapsed = (performance.now() - latestTimeline.receivedAt) / 1000;
        return Math.min(latestTimeline.position + elapsed, latestTimeline.duration);
      }
      return latestTimeline.duration;
    }

    function updateTimelineDisplay() {
      if (!latestTimeline || draggingSlider) return;

      const duration = latestTimeline.duration;
      const position = getDisplayedTimelinePosition();

      dvrSlider.disabled = duration <= 0;
      dvrSlider.max = duration;
      dvrSlider.value = Math.min(position, duration);
      timelineCurrent.textContent = formatTime(Number(dvrSlider.value || 0));
      timelineEnd.textContent = duration > 0 ? formatTime(duration) : 'LIVE';

      if (duration <= 0) {
        timelineStatus.textContent = 'Recording starts immediately. Playback appears after first finalized segment.';
      } else if (latestTimeline.mode === 'live') {
        timelineStatus.textContent = 'Live mode';
        if (Date.now() - lastSeekTime > 3000) {
          liveBtn.style.display = 'none';
        }
      } else if (latestTimeline.mode === 'gap') {
        timelineStatus.textContent = 'No recording available';
        liveBtn.style.display = 'inline-block';
      } else {
        const behindLive = Math.max(0, duration - position);
        timelineStatus.textContent = `Playback mode - ${formatTime(behindLive)} behind live`;
        liveBtn.style.display = 'inline-block';
      }

      // keep star pins in sync as the total duration grows
      renderStarPins();
    }

    function renderTimeline(msg) {
      timelinePanel.style.display = 'flex';

      const duration = Number(msg.duration || 0);
      const position = Number(msg.playback_offset ?? duration);
      latestTimeline = {
        mode: msg.mode,
        duration,
        position,
        receivedAt: performance.now(),
      };

      updateTimelineDisplay();

      if (duration <= 0) {
        timelineStatus.textContent = 'Recording starts immediately. Playback appears after first finalized segment.';
        liveBtn.style.display = 'none';
        return;
      }

      if (msg.mode === 'live') {
        timelineStatus.textContent = 'Live mode';
        if (Date.now() - lastSeekTime > 3000) {
          liveBtn.style.display = 'none';
        }
      } else if (msg.mode === 'gap') {
        timelineStatus.textContent = 'No recording available';
        liveBtn.style.display = 'inline-block';
      } else {
        const behindLive = Math.max(0, duration - position);
        timelineStatus.textContent = `Playback mode - ${formatTime(behindLive)} behind live`;
        liveBtn.style.display = 'inline-block';
      }
    }

    function setNetworkMode(mode) {
      networkModeEl.textContent = `Mode: ${mode}`;
      networkModeEl.className = mode === 'TURN' ? 'turn' : mode === 'P2P' ? 'p2p' : '';
    }

    // Data channel controls only the device-side playback mode.
    liveBtn.addEventListener('click', () => {
      sendCmd({ cmd: 'live' });
      uiLog('Switched to live');
    });

    dvrSlider.addEventListener('input', () => {
      draggingSlider = true;
      timelineCurrent.textContent = formatTime(Number(dvrSlider.value || 0));
    });

    dvrSlider.addEventListener('change', () => {
      draggingSlider = false;
      const offset = Number(dvrSlider.value || 0);
      sendCmd({ cmd: 'seek', offset });
      latestTimeline = {
        mode: 'playback',
        duration: Number(dvrSlider.max || 0),
        position: offset,
        receivedAt: performance.now(),
      };
      updateTimelineDisplay();
      uiLog(`Seeking to ${formatTime(offset)}`);
      lastSeekTime = Date.now();
      liveBtn.style.display = 'inline-block';
    });

    async function vsSet(key, value) {
      const resp = await fetch(`${ANEDYA_API_BASE}/valuestore/setValue`, {
        method: 'POST',
        headers: getVsHeaders(),
        body: JSON.stringify({ namespace: getVsNamespace(), key, value, type: 'string' }),
      });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`vsSet failed: ${resp.status} - ${text}`);
      }
    }

    async function vsGet(key) {
      const resp = await fetch(`${ANEDYA_API_BASE}/valuestore/getValue`, {
        method: 'POST',
        headers: getVsHeaders(),
        body: JSON.stringify({ namespace: getVsNamespace(), key }),
      });
      if (!resp.ok) return null;
      const json = await resp.json();
      if (!json.value) return null;
      return json.value;
    }

    async function fetchTurnCredentials() {
      const resp = await fetch(`${ANEDYA_API_BASE}/relay/create`, {
        method: 'POST',
        headers: getVsHeaders(),
        body: JSON.stringify({ relayType: 'turn' }),
      });
      if (!resp.ok) throw new Error(`TURN fetch failed: ${resp.status}`);
      const json = await resp.json();
      if (!json.relayData) throw new Error(json.error || 'no relayData');
      return {
        ...json.relayData,
        password: json.relayData.credential,
        relayExpiry: json.relayExpiry,
      };
    }

    function buildIceConfig(relayData) {
      /*
        PeerConnection config for browser side.

        Browser and device both use same TURN allocation details. This allows
        connection through NAT even when direct P2P is not possible.
      */
      return {
        iceTransportPolicy: relayOnlyEnabled() ? 'relay' : 'all',
        iceServers: [{
          urls: [
            // TODO : Dont hardcode these - get from API
            'stun:turn1.ap-in-1.anedya.io:3478',
            'turn:turn1.ap-in-1.anedya.io:3478'
          ],
          username: relayData.username,
          credential: relayData.password
        }],
      };
    }

    settingsBtn.addEventListener('click', toggleSettingsPanel);

    fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) {
          await video.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        uiLog('Fullscreen error: ' + err.message);
      }
    });

    saveSettingsBtn.addEventListener('click', () => {
      const nodeId = nodeIdInput.value.trim();
      const value = apiKeyInput.value.trim();
      if (nodeId) {
        localStorage.setItem(STORAGE_KEYS.nodeId, nodeId);
      } else {
        localStorage.removeItem(STORAGE_KEYS.nodeId);
      }
      if (value) {
        localStorage.setItem(STORAGE_KEYS.apiKey, value);
      } else {
        localStorage.removeItem(STORAGE_KEYS.apiKey);
      }
      localStorage.setItem(STORAGE_KEYS.relayOnly, String(relayOnlyToggle.checked));
      uiLog(`Settings saved (${nodeId ? 'node set' : 'node missing'}, ${value ? 'key set' : 'key missing'}, relay ${relayOnlyToggle.checked ? 'forced' : 'auto'})`);
      settingsPanel.style.display = 'none';
    });

    relayOnlyToggle.addEventListener('change', () => {
      localStorage.setItem(STORAGE_KEYS.relayOnly, String(relayOnlyToggle.checked));
    });

    muteToggle.addEventListener('change', () => {
      video.muted = muteToggle.checked;
    });

    startBtn.addEventListener('click', async () => {
      if (!getNodeId()) {
        uiLog('Missing node ID');
        statusEl.textContent = 'Missing node ID';
        statusEl.className = 'error';
        settingsPanel.style.display = 'flex';
        return;
      }

      if (!getApiKey()) {
        uiLog('Missing API key');
        statusEl.textContent = 'Missing API key';
        statusEl.className = 'error';
        settingsPanel.style.display = 'flex';
        return;
      }

      startBtn.disabled = true;
      stopBtn.disabled = false;
      statusEl.textContent = 'Fetching TURN credentials...';
      statusEl.className = '';

      // Step 1: browser asks Anedya for TURN credentials.
      let relayData;
      try {
        relayData = await fetchTurnCredentials();
        uiLog(`TURN ready (expires ${new Date(relayData.relayExpiry * 1000).toLocaleTimeString()})`);
      } catch (err) {
        uiLog('TURN error: ' + err.message);
        statusEl.textContent = 'Error';
        statusEl.className = 'error';
        resetUI();
        return;
      }

      // Step 2: browser creates peer connection and data channel.
      pc = new RTCPeerConnection(buildIceConfig(relayData));
      dc = pc.createDataChannel('control', { ordered: true });

      dc.onopen = () => {
        uiLog('DataChannel open - requesting timeline');
        timelinePanel.style.display = 'flex';
        sendCmd({ cmd: 'timeline' });

        // Timeline is polled so browser UI updates while recording window grows.
        timelineTimer = setInterval(() => sendCmd({ cmd: 'timeline' }), 2000);
        timelineRenderTimer = setInterval(updateTimelineDisplay, 250);

        // Pull starred moments from Anedya ValueStore so all operators
        // who share the same Node ID + API Key see the same stars.
        pullStarsFromCloud();
      };

      dc.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'timeline') {
            if (!timelineReadyLogged) {
              uiLog('Timeline ready');
              timelineReadyLogged = true;
            }
            renderTimeline(msg);
          } else if (msg.type === 'error') {
            uiLog('Error: ' + msg.message);
          }
        } catch (err) {
          uiLog('DataChannel message error: ' + err.message);
        }
      };

      // Browser receives media only. Device sends video/audio.
      const videoTransceiver = pc.addTransceiver('video', { direction: 'recvonly' });
      pc.addTransceiver('audio', { direction: 'recvonly' });

      // Prefer H.264 when browser supports codec preference ordering.
      if (RTCRtpReceiver.getCapabilities) {
        const { codecs } = RTCRtpReceiver.getCapabilities('video');
        const h264 = codecs.filter(c => c.mimeType === 'video/H264');
        const rest = codecs.filter(c => c.mimeType !== 'video/H264');
        if (h264.length) {
          try {
            videoTransceiver.setCodecPreferences([...h264, ...rest]);
            uiLog('Codec: H.264 preferred');
          } catch (e) {
            uiLog('setCodecPreferences not supported - using browser default');
          }
        }
      }

      pc.ontrack = (e) => {
        uiLog('Got remote track: ' + e.track.kind);
        if (e.streams && e.streams[0]) {
          video.srcObject = e.streams[0];
          statusEl.textContent = 'Streaming';
          statusEl.className = 'connected';
        }
      };

      pc.onconnectionstatechange = async () => {
        uiLog('PC state: ' + pc.connectionState);
        if (pc.connectionState === 'connected') {
          const stats = await pc.getStats();
          stats.forEach(report => {
            if (report.type === 'candidate-pair' && report.state === 'succeeded') {
              const local = stats.get(report.localCandidateId);
              const remote = stats.get(report.remoteCandidateId);
              if (local?.candidateType === 'relay' || remote?.candidateType === 'relay') {
                uiLog('Candidate type: TURN');
                setNetworkMode('TURN');
              } else {
                uiLog('Candidate type: P2P');
                setNetworkMode('P2P');
              }
            }
          });
        } else if (pc.connectionState === 'failed') {
          statusEl.textContent = 'Connection failed';
          statusEl.className = 'error';
          stopStream();
        }
      };

      // Step 3: create offer and wait until all local ICE candidates are gathered.
      statusEl.textContent = 'Gathering ICE...';
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      // TODO
      await new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') { resolve(); return; }
        pc.onicegatheringstatechange = () => {
          if (pc.iceGatheringState === 'complete') resolve();
        };
      });

      const hasRelayCandidates = pc.localDescription.sdp.split('\n').some(
        l => l.trim().startsWith('a=candidate:') && l.includes('typ relay')
      );
      if (!hasRelayCandidates) {
        uiLog('Warning: Failed to create relay candidate. Please check your quota limits.');
      }

      // Step 4: write offer + TURN data into Anedya value store.
      const sessionId = Math.random().toString(36).slice(2, 10);
      const offerKey = `offer_${sessionId}`;
      const answerKey = `answer_${sessionId}`;

      try {
        statusEl.textContent = 'Sending offer...';
        const payload = JSON.stringify({
          offer: { sdp: pc.localDescription.sdp, type: pc.localDescription.type },
          turn: relayData
        });
        await vsSet(offerKey, payload);
        uiLog(`Offer written (key=${offerKey}) - polling for answer...`);
        statusEl.textContent = 'Waiting for Pi...';
      } catch (err) {
        uiLog('Error writing offer: ' + err.message);
        statusEl.textContent = 'Error';
        statusEl.className = 'error';
        resetUI();
        return;
      }

      // Step 5: poll for answer. Device writes answer into `answer_<sessionId>`.
      let attempts = 0;
      const MAX_ATTEMPTS = 30;
      pollTimer = setInterval(async () => {
        attempts++;
        if (attempts > MAX_ATTEMPTS) {
          clearInterval(pollTimer); pollTimer = null;
          uiLog('Timeout: Pi did not respond in time');
          statusEl.textContent = 'Timeout';
          statusEl.className = 'error';
          stopStream();
          return;
        }

        try {
          const value = await vsGet(answerKey);
          if (value) {
            clearInterval(pollTimer); pollTimer = null;
            const answerSdp = JSON.parse(value);
            await pc.setRemoteDescription(new RTCSessionDescription(answerSdp));
            uiLog('Answer applied - WebRTC connecting...');
          }
        } catch (err) {
          uiLog('Poll error: ' + err.message);
        }
      }, 2000);
    });

    stopBtn.addEventListener('click', stopStream);

    statusEl.textContent = 'Ready - press Start';
    statusEl.className = 'connected';
    startBtn.disabled = false;
    syncSettingsUI();

    /* ============================================================
       STARRED MOMENTS — added by paras0608
       All original code above is untouched.
       ============================================================ */

    const STAR_STORAGE_KEY    = 'pi-cam.starredMoments';
    const STAR_VALUESTORE_KEY = 'starred_moments';   // key used in Anedya ValueStore

    // Stars are kept in localStorage (instant, offline-friendly) AND
    // mirrored to Anedya ValueStore (cloud, shared across all operators
    // who have the same Node ID + API Key).
    let stars = JSON.parse(localStorage.getItem(STAR_STORAGE_KEY) || '[]');

    // ── Cloud helpers ─────────────────────────────────────────────
    // Push the current stars array to Anedya ValueStore.
    // Called after every add / delete / rename so the cloud copy
    // is always in sync. Silently skips if credentials are missing
    // (e.g. user hasn't entered Node ID / API Key yet).
    async function pushStarsToCloud() {
      try {
        await vsSet(STAR_VALUESTORE_KEY, JSON.stringify(stars));
        uiLog('Stars synced to Anedya ValueStore');
      } catch (err) {
        // Credentials missing or network error — local copy is still safe.
        uiLog('Stars saved locally (cloud sync skipped: ' + err.message + ')');
      }
    }

    // Pull the stars array from Anedya ValueStore and merge with
    // any local stars so nothing is lost.
    async function pullStarsFromCloud() {
      try {
        const raw = await vsGet(STAR_VALUESTORE_KEY);
        if (!raw) return;                          // nothing in cloud yet
        const cloudStars = JSON.parse(raw);

        // Merge: keep any local star whose id is not already in cloud.
        const cloudIds = new Set(cloudStars.map(s => s.id));
        const localOnly = stars.filter(s => !cloudIds.has(s.id));
        stars = [...cloudStars, ...localOnly];

        localStorage.setItem(STAR_STORAGE_KEY, JSON.stringify(stars));
        renderStarPins();
        renderStarList();
        uiLog('Stars loaded from Anedya ValueStore (' + stars.length + ' total)');
      } catch (err) {
        uiLog('Cloud star load skipped: ' + err.message);
      }
    }

    function saveStars() {
      // Always save locally first (instant, works offline).
      localStorage.setItem(STAR_STORAGE_KEY, JSON.stringify(stars));
      // Then mirror to cloud (async — does not block the UI).
      pushStarsToCloud();
    }

    function currentOffset() {
      // Returns the current playback offset in seconds from the existing slider.
      return Number(dvrSlider.value || 0);
    }

    function totalDuration() {
      return Number(dvrSlider.max || 0);
    }

    // How many seconds we rewind when starring during live mode.
    // Reason: the camera saves video in 5-second chunks. By the time
    // you notice something interesting and press Star, that moment is
    // already sitting in the previous chunk. Going back 8 seconds
    // (just over one full chunk) guarantees the starred moment lands
    // inside a chunk that is already fully saved on the Pi and
    // seekable — not in a chunk that is still being written.
    const LIVE_REWIND_SECONDS = 8;

    function isLiveMode() {
      // latestTimeline.mode is 'live' when the Pi is streaming live.
      // If we have no timeline yet (slider max = 0) we are also in live.
      return !latestTimeline || latestTimeline.mode === 'live';
    }

    function addStar() {
      const input = document.getElementById('starNameInput');
      const name = input.value.trim() || 'Starred moment';

      let offset;
      let starredDuringLive = false;

      if (isLiveMode()) {
        // LIVE MODE — rewind 8 seconds so the star lands in an
        // already-saved chunk, not in the chunk still being written.
        const rawOffset = currentOffset();
        offset = Math.max(0, rawOffset - LIVE_REWIND_SECONDS);
        starredDuringLive = true;
      } else {
        // PLAYBACK MODE — star exactly where the slider is.
        offset = currentOffset();
      }

      const star = {
        id: Date.now(),
        offset,
        timeLabel: formatTime(offset),
        name,
        savedAt: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        starredDuringLive,
      };

      stars.push(star);
      saveStars();
      input.value = '';
      renderStarPins();
      renderStarList();

      if (starredDuringLive) {
        showStarToast('⭐ "' + star.name + '" starred — pinned 8s back at ' + star.timeLabel);
      } else {
        showStarToast('⭐ "' + star.name + '" starred at ' + star.timeLabel);
      }
    }

    function deleteStar(id) {
      stars = stars.filter(s => s.id !== id);
      saveStars();
      renderStarPins();
      renderStarList();
    }

    function renameStar(id, newName) {
      const s = stars.find(s => s.id === id);
      if (s) {
        s.name = newName || 'Starred moment';
        saveStars();
        renderStarPins(); // update tooltips
      }
    }

    function seekToStar(offset) {
      // Reuse the existing seek logic — send cmd to Pi and update UI.
      dvrSlider.value = offset;
      sendCmd({ cmd: 'seek', offset });
      latestTimeline = {
        mode: 'playback',
        duration: totalDuration(),
        position: offset,
        receivedAt: performance.now(),
      };
      updateTimelineDisplay();
      lastSeekTime = Date.now();
      liveBtn.style.display = 'inline-block';
    }

    /* Star pins sit above the DVR slider and are positioned by percentage. */
    function renderStarPins() {
      const track = document.getElementById('star-track');
      track.innerHTML = '';
      const dur = totalDuration();
      if (dur <= 0) return;

      stars.forEach(s => {
        const pct = Math.min(100, Math.max(0, (s.offset / dur) * 100));
        const pin = document.createElement('div');
        pin.className = 'star-pin';
        pin.style.left = pct + '%';
        pin.innerHTML = `<span class="star-pin-tip">${s.name} · ${s.timeLabel}</span>⭐`;
        pin.addEventListener('click', () => {
          seekToStar(s.offset);
          showStarToast('⏩ Jumped to "' + s.name + '"');
        });
        track.appendChild(pin);
      });
    }

    /* The list below the panel showing all stars, newest first. */
    function renderStarList() {
      const list  = document.getElementById('star-list');
      const empty = document.getElementById('star-empty');
      list.querySelectorAll('.star-item').forEach(el => el.remove());

      if (stars.length === 0) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      [...stars].reverse().forEach(s => {
        const item = document.createElement('div');
        item.className = 'star-item';
        const safeName = s.name.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
        // Show a small badge if this star was captured during live mode
        const liveBadge = s.starredDuringLive
          ? '<span style="font-size:0.68rem;background:#3b2f0a;color:#facc15;border-radius:4px;padding:1px 5px;white-space:nowrap;">📍 Live −8s</span>'
          : '';
        item.innerHTML = `
          <span style="font-size:1rem;">⭐</span>
          <span class="star-item-time">${s.timeLabel}</span>
          <input class="star-item-name" value="${safeName}" placeholder="Add a name…" title="Click to rename" />
          ${liveBadge}
          <span style="font-size:0.72rem;color:#444;white-space:nowrap;">${s.savedAt}</span>
          <button class="star-del">✕</button>
        `;

        // click timestamp → seek
        item.querySelector('.star-item-time').addEventListener('click', () => {
          seekToStar(s.offset);
          showStarToast('⏩ Jumped to "' + s.name + '"');
        });

        // rename inline
        const nameInput = item.querySelector('.star-item-name');
        nameInput.addEventListener('change', () => renameStar(s.id, nameInput.value.trim()));
        nameInput.addEventListener('blur',   () => renameStar(s.id, nameInput.value.trim()));

        // delete
        item.querySelector('.star-del').addEventListener('click', () => deleteStar(s.id));

        list.appendChild(item);
      });
    }

    /* Small toast notification */
    let starToastTimer;
    function showStarToast(msg) {
      const toast = document.getElementById('star-toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(starToastTimer);
      starToastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
    }

    document.getElementById('starBtn').addEventListener('click', addStar);

    // Allow pressing Enter in the name field to star immediately.
    document.getElementById('starNameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addStar();
    });

    // Initial render (loads any stars saved from a previous session).
    renderStarPins();
    renderStarList();

    /* end STARRED MOMENTS */
  </script>
</body>

</html>
